name: assignment-test
on:
    push:
        tags-ignore:
            - '*'
        branches:
            - '*'
jobs:
    full-test:
        container: cuaesd/aesd-autotest:24-assignment5-buildroot
        runs-on: self-hosted
        timeout-minutes: 120
        steps:
          - uses: actions/checkout@v2
          - name: Checkout submodules
            run: git submodule update --init --recursive
          - uses: webfactory/ssh-agent@v0.5.3
            with:
                ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          - name: Run full test
            env:
              GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=no"
            run: ./full-test.sh

          - name: Check build artifacts
            run: |
              echo "Listing buildroot output images..."
              ls -lh buildroot/output/images/ || true
              echo "Checking Image existence..."
              test -f buildroot/output/images/Image && echo "Image found ✅" || echo "Image missing ❌"
              echo "Checking rootfs.ext4 existence..."
              test -f buildroot/output/images/rootfs.ext4 && echo "rootfs.ext4 found ✅" || echo "rootfs.ext4 missing ❌"
              
          - name: Cleanup
            if: always()
            run: |
              ssh-add -D
